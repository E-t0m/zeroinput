	"day_weights_pct_help": "per-day weighting (percent) for the average, chronological: index 0 = oldest day (today minus average_days, i.e. same weekday last week), index -1 = yesterday. Weighting yesterday and last week's same weekday higher captures recent trend and weekday structure. Length must equal average_days; on mismatch all days are weighted equally. All 100 = neutral.",

