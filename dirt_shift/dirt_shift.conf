	"vz_chans_help": "volkszähler channel UUIDs. basic_load consumption = Import + |Inverter| - Auto (adapt the formula in get_average and this channel set to your own installation). PV and Vbat are used for the night window and battery content.",
	"vz_dirtiness_uuid": "",
	"vz_dirtiness_uuid_help": "optional, only used once smard_enabled is true: real volkszähler channel UUID (created in volkszähler beforehand) for the current grid dirtiness value. dirt_shift POSTs the value directly to volkszähler's middleware API once per run — http://{vz_host_port}/data/{this UUID}.json — no vzlogger meter or local file involved. Sign convention matches the installation's existing power channels (Import positive = drawing from the grid, Inverter negative = feeding in): positive = dirtier (below-average renewable share), negative = cleaner than average / renewable surplus. Empty disables the write.",
	"average_days": 7,
	"average_days_help": "days of history for the hourly basic_load/PV average. 7 = one full week structure. Cached hourly in dirt_avg_cache.json.",
	"day_weights_pct": [
		200,
		100,
		100,
		100,
		100,
		150,
		200
	],
	"day_weights_pct_help": "per-day weighting (percent) for the average, chronological: index 0 = oldest day (today minus average_days, i.e. same weekday last week), index -1 = yesterday. Weighting yesterday and last week's same weekday higher captures recent trend and weekday structure. Length must equal average_days; on mismatch all days are weighted equally. All 100 = neutral. In the web form, edit as a comma-separated list.",
	"reserve_pct": 90,
	"reserve_pct_help": "percent of the basic_load demand over the coming high-intensity (red) window to reserve for the night. ~90 so the reserve is nearly used up by morning.",
	"build_reserve_after": "13:30",
	"build_reserve_after_help": "fallback clock cutoff (HH:MM), used only when no PV forecast is available at all (PV curve never successfully computed). Normally the reserve is protected as soon as a full energy-balance projection (current battery content plus the forecasted PV yield remaining until the coming red window, minus the basic_load still due in that span) would fall short of the reserve — independent of the clock. Whether current content has already dropped to the reserve is a separate, always-active check that distinguishes yellow's 'limit' (still above it) from 'stop' (at or below it).",
	"smard_enabled": false,
	"latitude": 51.0,
	"longitude": 10.0,
	"green_morning_offset_h": 3.5,
	"red_evening_offset_h": 3.0,
	"green_earliest": 9.0,
	"green_latest": 17.5,
	"yellow_width_h": 1.0,
	"yellow_cap": 600,
	"yellow_cap_help": "discharge power cap in Watt for the yellow (transition) zone. Household short-term consumption is inherently unpredictable, so this is a fixed, explicitly configured limit rather than a value derived from forecast data — it protects the red reserve from being drawn down by short spikes, while the slot's Wh budget (unaffected by this cap) continues to bound the actual energy handed out. Not related to any inverter staging threshold in zeroinput.conf.",
	"PV_to_bat_efficiency": 98,
	"bat_to_AC_efficiency": 90,
	"max_days_empty_battery": 5,
	"max_days_empty_battery_help": "how many days back to search for a 'battery empty' state (voltage <= 49 V) as the integration anchor.",
	"disable_zeroinput_timer": false,
	"disable_zeroinput_timer_help": "set true to compute and print without writing the timer file (dry run).",
	"latitude_help": "decimal degrees (north) of the installation, for the sunrise/sunset calculation that drives the sun-position grid CO2-intensity profile. Default ~centre of Germany.",
	"longitude_help": "decimal degrees (east) of the installation, for the same sunrise/sunset calculation. Default ~centre of Germany.",
	"green_earliest_help": "sun-position-based grid CO2-intensity profile (no external data) — used whenever smard_enabled above is false or the SMARD query fails; otherwise real SMARD data drives the zones instead. Low-intensity (green) window: start = max(sunrise + green_morning_offset_h, green_earliest), end = min(sunset - red_evening_offset_h, green_latest). Intensity only drops once PV is up relative to the load; in summer the clock bounds dominate (load ramps by time of day), in winter the later sunrise / earlier sunset shrinks the window. yellow_width_h is the transition band on both edges. red = high intensity (no discharge limit), yellow = capped at yellow_cap, green = no battery discharge.",
	"green_latest_help": "fixed clock upper bound (hour, 24h) for the green window end, alongside green_morning_offset_h/red_evening_offset_h — see green_earliest for the full hybrid mechanism.",
	"green_morning_offset_h_help": "hours after sunrise before the green window may start (see green_earliest for the full hybrid mechanism).",
	"red_evening_offset_h_help": "hours before sunset when the green window must end (see green_earliest for the full hybrid mechanism).",
	"yellow_width_h_help": "width (hours) of the yellow transition band on both edges of the green window (see green_earliest for the full hybrid mechanism).",
	"PV_to_bat_efficiency_help": "percent efficiency PV -> battery, used to reconstruct the real battery energy content (see get_vz_bat_cap).",
	"bat_to_AC_efficiency_help": "percent efficiency battery -> AC/inverter, used the same way as PV_to_bat_efficiency.",
	"smard_enabled_help": "real grid CO2-intensity zones from SMARD day-ahead data (Bundesnetzagentur; no API key needed), replacing the sun-position zones below. false (default) uses the sun-position profile only. SMARD's day-ahead wind+solar generation forecast is combined with its day-ahead consumption forecast into an hourly renewable-share ratio, then the day's hours are split by percentile into red/yellow/green (see dirtiness_help). A failed SMARD query falls back to the sun-position profile for that run."
}
