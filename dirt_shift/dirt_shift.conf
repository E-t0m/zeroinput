	"build_reserve_after": "13:30",
	"build_reserve_after_help": "time of day (HH:MM) from which the night reserve is protected. Before it the battery discharges freely into whatever is high-intensity now (incl. the morning red window). From it, surplus above the reserve may still go out into high-intensity hours, but once content drops to the reserve, discharge stops until the night red window begins.",

	"latitude": 51.0,
