	"location_help": "decimal degrees of the installation, for the sunrise/sunset calculation that drives the grid CO2-intensity profile. Default ~centre of Germany.",

	"green_morning_offset_h": 3.5,
	"red_evening_offset_h": 3.0,
	"green_earliest": 9.0,
	"green_latest": 17.5,
	"yellow_width_h": 1.0,
	"dirtiness_help": "grid CO2-intensity profile (no external data), a hybrid of sun position and fixed clock bounds. Low-intensity (green) window: start = max(sunrise + green_morning_offset_h, green_earliest), end = min(sunset - red_evening_offset_h, green_latest). Intensity only drops once PV is up relative to the load; in summer the clock bounds dominate (load ramps by time of day), in winter the later sunrise / earlier sunset shrinks the window. yellow_width_h is the transition band on both edges. red = high intensity (no discharge limit), yellow = single-inverter cap, green = no battery discharge.",

