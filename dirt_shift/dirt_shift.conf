{
	"_help": "dirt_shift configuration. Shared values (the timer file path) are read from zeroinput.conf — not duplicated here. This file holds only the path to zeroinput.conf and the dirt_shift-specific parameters. SMARD day-ahead grid data is a prerequisite: if its fetch fails, cached data substitutes for one more day, after which dirt_shift aborts and leaves an all-allowed timer.",
	"zeroinput_conf": "../zeroinput.conf",
	"zeroinput_conf_help": "path to zeroinput.conf (dirt_shift usually lives in a subfolder of zeroinput). discharge_t_file (the timer path) is read from there.",
	"vz_host_port": "192.168.1.10:8080",
	"vz_host_port_help": "volkszähler host:port for the data.json API (dirt_shift uses the HTTP API, separate from zeroinput's vzlogger FIFO).",
	"vz_chans": {
		"Inverter": "00000000-0000-0000-0000-000000000001",
		"Import": "00000000-0000-0000-0000-000000000002",
		"Auto": "00000000-0000-0000-0000-000000000003",
		"PV": "00000000-0000-0000-0000-000000000006",
		"Vbat": "00000000-0000-0000-0000-000000000007"
	},
	"vz_chans_help": "volkszähler channel UUIDs. basic_load consumption = Import + |Inverter| - Auto (adapt the formula in get_average and this channel set to your own installation). PV and Vbat are used for the red window and battery content.",
	"vz_dirtiness_uuid": "",
	"vz_dirtiness_uuid_help": "optional: real volkszähler channel UUID (created in volkszähler beforehand) for the current grid dirtiness value. dirt_shift POSTs the value directly to volkszähler's middleware API once per run — http://{vz_host_port}/data/{this UUID}.json — no vzlogger meter or local file involved. Sign convention matches the installation's existing power channels (Import positive = drawing from the grid, Inverter negative = feeding in): positive = dirtier (below-average renewable share), negative = cleaner than average / renewable surplus. Empty disables the write.",
	"average_days": 7,
	"average_days_help": "days of history for the hourly basic_load/PV average. 7 = one full week structure. Cached hourly in dirt_avg_cache.json.",
	"day_weights_pct": [
		200,
		100,
		100,
		100,
		100,
		150,
		200
	],
	"day_weights_pct_help": "per-day weighting (percent) for the average, chronological: index 0 = oldest day (today minus average_days, i.e. same weekday last week), index -1 = yesterday. Weighting yesterday and last week's same weekday higher captures recent trend and weekday structure. Length must equal average_days; on mismatch all days are weighted equally. All 100 = neutral. In the web form, edit as a comma-separated list.",
	"reserve_pct": 90,
	"reserve_pct_help": "percent of the basic_load demand over every red hour between now and the next PV surplus phase (see red_window_demand) to hold back as the red reserve. ~90 so the reserve is nearly used up by the time PV production resumes.",
	"build_reserve_after": "13:30",
	"build_reserve_after_help": "clock cutoff (HH:MM), used only when no PV forecast is available at all (PV curve never successfully computed, e.g. a fresh install). Normally the cleanest hours needed to cover the red reserve are selected directly (see dirty_protect_hours), independent of the clock. Whether current content has already dropped to the reserve is a separate, always-active check that distinguishes yellow's 'limit' (still above it) from 'stop' (at or below it).",
	"latitude": 51.0,
	"longitude": 10.0,
	"yellow_cap": 1000,
	"yellow_cap_help": "discharge power cap in Watt for the yellow (transition) zone. Household short-term consumption is inherently unpredictable, so this is a fixed, explicitly configured limit rather than a value derived from forecast data — it protects the red reserve from being drawn down by short spikes, while the slot's Wh budget (unaffected by this cap) continues to bound the actual energy handed out. Not related to any inverter staging threshold in zeroinput.conf.",
	"PV_to_bat_efficiency": 98,
	"bat_to_AC_efficiency": 90,
	"max_days_empty_battery": 7,
	"max_days_empty_battery_help": "how many days back to search for a 'battery empty' state (voltage <= 49 V) as the integration anchor.",
	"disable_zeroinput_timer": false,
	"disable_zeroinput_timer_help": "set true to compute and print without writing the timer file (dry run).",
	"latitude_help": "decimal degrees (north) of the installation, for the clear-sky irradiance model (clear_sky_ghi) and the Open-Meteo radiation forecast. Default ~centre of Germany.",
	"longitude_help": "decimal degrees (east) of the installation, for the same clear-sky model and radiation forecast. Default ~centre of Germany.",
	"PV_to_bat_efficiency_help": "percent efficiency PV -> battery, used to reconstruct the real battery energy content (see get_vz_bat_cap).",
	"bat_to_AC_efficiency_help": "percent efficiency battery -> AC/inverter, used the same way as PV_to_bat_efficiency."
}
