"basic_load_inverter_port_help":	"the port of the inverter for the basic power demand",

"total_number_of_inverters":		3,
"total_number_of_inverters_help":	"number of inverters, including the basic load inverter",

"max_input_power":					2700,
"max_input_power_help":				"[W] maximum power of all inverters combined",

"max_bat_discharge":				2700,
